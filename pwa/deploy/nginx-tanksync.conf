# Nginx reverse proxy for TankSync PWA
# Place in /etc/nginx/sites-available/tanksync then symlink to sites-enabled
#
# For local network (no SSL):
#   Access at http://your-server-ip or http://tanksync.local
#
# For public/DigitalOcean (with SSL via Certbot):
#   1. Point your domain DNS A record to your droplet IP
#   2. Install certbot: sudo apt install certbot python3-certbot-nginx
#   3. Run: sudo certbot --nginx -d your-domain.com
#   4. Certbot auto-configures SSL in this file

server {
    listen 80;
    server_name tanksync.local your-server-ip;
    # For public: server_name your-domain.com;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to Node.js
    location / {
        proxy_pass http://127.0.0.1:4800;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # SSE — disable buffering for real-time events
    location /events {
        proxy_pass http://127.0.0.1:4800;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|svg|woff2|ico)$ {
        proxy_pass http://127.0.0.1:4800;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Client max body size for OTA uploads
    client_max_body_size 2M;
}
